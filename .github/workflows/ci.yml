name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  TZ: "Asia/Tokyo"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test
